name: digital-will-executor
version: "1.0.0"
description: >
  An RL environment where an AI agent acts as a digital estate executor.
  Given a deceased person's vague digital will and a list of digital assets
  (social media, crypto, subscriptions, email, cloud storage), the agent must
  decide the correct action for each asset: delete, transfer, memorialize,
  cancel, archive, or flag for human review.

  The environment explicitly rewards epistemic humility — deferring under
  uncertainty is scored better than taking irreversible destructive actions.

author: digital-will-executor-team
tags:
  - openenv
  - digital-estate
  - decision-making
  - ethics
  - real-world

tasks:
  - id: easy
    description: Clear will instructions, unambiguous assets. Agent must categorize and act correctly.
    difficulty: easy
    max_steps: 10
    success_threshold: 0.5

  - id: medium
    description: Vague will instructions. Agent must infer correct actions from context and asset properties.
    difficulty: medium
    max_steps: 15
    success_threshold: 0.5

  - id: hard
    description: Conflicting instructions, active business assets, secret accounts, executor ≠ heir.
    difficulty: hard
    max_steps: 20
    success_threshold: 0.5

observation_space:
  type: object
  fields:
    - task_id: string
    - will: object (raw_text, beneficiaries, executor_name, conflict_note)
    - assets: list of DigitalAsset objects
    - remaining_asset_ids: list of strings
    - decisions_made: dict
    - irreversible_actions_taken: integer
    - step_number: integer

action_space:
  type: object
  fields:
    - asset_id: string (must match an asset id in remaining_asset_ids)
    - action: enum [delete_permanently, transfer_to_beneficiary, preserve_memorialize, cancel_subscription, archive_and_hold, flag_for_human_review]
    - reasoning: string

reward_range: [0.0, 1.0]

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
